<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rooh Travel - Booking</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-image: url("https://media.istockphoto.com/id/853577038/photo/flight-booking-keyboard-plane-travel-fly-check-buy.jpg?s=612x612&w=0&k=20&c=sC0hzbYqFiuTOTrr7728mfSrBLqgnFtBFFkrZ41co5E=");
        background-size: cover;
        background-position: center;
        min-height: 100vh;
        font-family: "Ubuntu", sans-serif;
        position: relative;
        color: #333;
      }
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.4); /* شفافية لتسهيل القراءة */
        z-index: -1;
      }

      nav {
        background-color: rgba(0, 150, 136, 0.9);
        padding: 1rem;
        display: flex;
        justify-content: center;
        gap: 1rem;
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
      }
      nav a {
        color: white;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
      }
      nav a:hover {
        text-decoration: underline;
      }

      header {
        background-color: rgba(0, 77, 64, 0.85);
        color: white;
        text-align: center;
        padding: 2rem 1rem;
        margin-top: 56px;
        font-size: 2rem;
        border-radius: 0 0 12px 12px;
      }

      .container {
        max-width: 600px;
        margin: 2rem auto;
        padding: 1.5rem;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      label {
        font-weight: bold;
        margin-bottom: 0.3rem;
      }

      input,
      select,
      textarea {
        padding: 0.75rem;
        font-size: 1rem;
        border: 1px solid #ccc;
        border-radius: 8px;
        resize: vertical;
      }

      button {
        background-color: #00796b;
        color: white;
        font-weight: bold;
        border: none;
        padding: 0.75rem;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1.1rem;
        transition: background-color 0.3s ease;
      }

      button:hover {
        background-color: #004d40;
      }

      .message {
        text-align: center;
        margin-top: 1rem;
        font-weight: bold;
        color: green;
      }
      footer {
        background-color: rgba(0, 150, 136, 0.8);
        color: white;
        padding: 2rem 1rem 1rem;
        margin-top: 3rem;
        font-size: 0.95rem;
      }

      footer .contact-info {
        max-width: 1100px;
        margin: auto;
        text-align: center;
        line-height: 1.7;
      }

      footer .social-links {
        margin-top: 0.8rem;
      }

      footer .social-links a {
        color: #e0f2f1;
        margin: 0 0.8rem;
        text-decoration: none;
        font-weight: bold;
        font-size: 1.1rem;
        transition: color 0.3s;
      }

      footer .social-links a:hover {
        color: #a7ffeb;
      }
    </style>
  </head>

  <body>
    <!-- Navigation -->
    <nav>
      <a href="home.html">🏠 Home</a>
      <a href="map.html">🗺️ Map</a>
      <a href="activities.html">🧭 Activities</a>
      <a href="costs.html">💰 Costs</a>
      <a href="contact.html">📞 Contact</a>
      <a href="booking.html">✈ Booking</a>
      <a href="PAYMENT.HTML">💳 PAYMENT</a>
      <a href="chatAI.html"> 🗨 AI ChatBot</a>
    </nav>

    <!-- Header -->
    <header>📅 Book Your Trip</header>

    <!-- Booking Form -->
    <div class="container">
      <form id="bookingForm">
        <label for="destination">Destination</label>
        <select id="destination" required>
          <option value="" disabled selected>Select your destination</option>
          <option value="Cairo">Cairo, Egypt</option>
          <option value="Giza">Giza - Pyramids</option>
          <option value="Hurghada">Hurghada - Red Sea</option>
          <option value="Wadi Rum">Wadi Rum, Jordan</option>
          <option value="Bali">Bali, Indonesia</option>
        </select>

        <label for="date">Travel Date</label>
        <input type="date" id="date" required />

        <label for="people">Number of People</label>
        <input type="number" id="people" required min="1" max="20" value="1" />

        <label for="details">Additional Details</label>
        <textarea
          id="details"
          rows="4"
          placeholder="Anything else we should know?"
        ></textarea>

        <button type="submit">Submit Booking</button>
        <div id="formMessage" class="message"></div>
      </form>
    </div>
    <footer>
      <div class="contact-info">
        <p><strong>Email:</strong> info@roohtravel.com</p>
        <p><strong>Phone:</strong> +962 7 1234 5678</p>
        <p><strong>Office Location:</strong> 123 Travel St, Amman, Jordan</p>
        <div class="social-links">
          <a href="https://facebook.com/roohtravel" target="_blank"
            >📘 Facebook</a
          >
          <a href="https://instagram.com/roohtravel" target="_blank"
            >📸 Instagram</a
          >
          <a href="https://snapchat.com/add/roohtravel" target="_blank"
            >👻 Snapchat</a
          >
        </div>
      </div>
      <div style="text-align: center; margin-top: 1rem">
        © 2025 Rooh Travel. All rights reserved.
      </div>
    </footer>

    <!-- JavaScript -->
    <script>
      const dateInput = document.getElementById("date");
      const today = new Date().toISOString().split("T")[0];
      dateInput.setAttribute("min", today);

      const form = document.getElementById("bookingForm");
      const formMessage = document.getElementById("formMessage");

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        formMessage.textContent = "";
        formMessage.style.color = "green";

        const destination = form.destination.value;
        const date = form.date.value;
        const people = form.people.value;
        const details = form.details.value.trim();

        if (!destination || !date || !people) {
          formMessage.style.color = "red";
          formMessage.textContent = "Please fill in all required fields.";
          return;
        }

        // Simulate booking logic
        formMessage.textContent = `Thank you! Your booking to ${destination} on ${date} for ${people} person(s) has been received.`;

        form.reset();
        dateInput.setAttribute("min", today);
      });
    </script>
  </body>
</html>
